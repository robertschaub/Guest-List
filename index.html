<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Gästeliste Check-in</title>
  <link rel="icon" type="image/png" href="assets/naturklang-logo.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=20260501-mobile-nav" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-brand">
        <img class="app-logo" src="assets/naturklang-logo.png" alt="Naturklang" />
        <div class="app-title-block">
          <div class="eyebrow">Gästeliste</div>
          <h1 id="eventTitle">Check-in</h1>
          <div class="event-meta" id="eventMeta" hidden></div>
        </div>
      </div>
      <div class="status-pill" id="connectionStatus">Startet…</div>
    </header>

    <main id="main" class="main shell">
      <section class="card">
        <h2>App lädt…</h2>
        <p>Falls diese Meldung bleibt, prüfe die Firebase-Konfiguration in <code>app-config.js</code>.</p>
      </section>
    </main>

    <footer class="app-footer shell">
      <span id="footerText">Bereit für Mobile, Tablet und Desktop.</span>
    </footer>
  </div>

  <script src="app-config.js"></script>
  <script type="module" src="app.js?v=20260501-mobile-nav"></script>
</body>
</html>
